<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Encrypted Work Planner</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f3f5;
            margin: 0;
            padding: 20px;
        }


        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px #ccc;
        }


        h1,
        h2 {
            text-align: center;
        }


        input,
        select,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }


        button {
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }


        button:hover {
            background: #004999;
        }


        .secondary {
            background: #666;
        }


        .danger {
            background: #cc0000;
        }


        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
        }


        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
        }


        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
        }


        .hidden {
            display: none;
        }


        table {

            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;

        }


        th,
        td {

            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;

        }


        th {

            background: #0066cc;
            color: white;

        }


        .card {

            border: 1px solid #ddd;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;

        }


        .small-btn {

            width: auto;
            padding: 6px 10px;
            margin: 2px;

        }
    </style>


</head>


<body>


    <div class="container">


        <h1>Encrypted Work Planner</h1>



        <!-- MESSAGE AREA -->

        <div id="message"></div>




        <!-- LOGIN -->


        <div id="loginBox" class="card">


            <h2>Open Database</h2>


            <label>
                Encryption Password
            </label>

            <input type="password" id="passwordInput" placeholder="Password">


            <button onclick="login()">
                Open
            </button>


        </div>

        <!-- APPLICATION -->


        <div id="app" class="hidden">


            <h2>Work Entry</h2>



            <div class="card">


                <label>Date</label>

                <input type="date" id="date">



                <label>Start Time</label>

                <input type="time" id="start">



                <label>Finish Time</label>

                <input type="time" id="finish">



                <label>Break?</label>

                <select id="hasBreak" onchange="toggleBreak()">

                    <option value="no">
                        No
                    </option>

                    <option value="yes">
                        Yes
                    </option>

                </select>




                <div id="breakArea" class="hidden">


                    <label>
                        Break Start
                    </label>

                    <input type="time" id="breakStart">


                    <label>
                        Break End
                    </label>

                    <input type="time" id="breakEnd">


                </div>




                <button onclick="saveRecord()" id="saveButton">
                    Add Record
                </button>


                <button onclick="clearForm()" class="secondary">
                    Clear
                </button>



            </div>





            <h2>Monthly Report</h2>


            <div class="card">


                <label>
                    Select Month
                </label>


                <select id="monthSelect" onchange="showMonth()">

                </select>


            </div>





            <table>


                <thead>

                    <tr>

                        <th>No.</th>
                        <th>Date</th>
                        <th>Start</th>
                        <th>Finish</th>
                        <th>Break Start</th>
                        <th>Break End</th>
                        <th>Break Time</th>
                        <th>Type</th>
                        <th>Total Hours</th>
                        <th>Action</th>


                    </tr>


                </thead>


                <tbody id="reportBody">


                </tbody>


            </table>



            <div class="card" id="summary">


            </div>


            <div id="githubStatus" class="card">

                GitHub status: Not saved

            </div>


            <button onclick="saveToGitHub()">
                Save To GitHub
            </button>


            <button onclick="retryGitHubSave()" class="secondary">
                Retry Save
            </button>



        </div>



    </div>





    <script>


        // ===========================
        // GLOBAL VARIABLES
        // ===========================


        let password = "";

        let records = [];

        let editIndex = -1;



        // GitHub settings
        let GITHUB_USER = " ";
        let GITHUB_REPO = " ";
        let GITHUB_FILE = " ";
        let GITHUB_TOKEN = " ";

        let config = {};

        async function loadConfig() {

            try {

                const response = await fetch("config.json");

                if (!response.ok) {
                    throw new Error("Config file not found");
                }

                config = await response.json();


                console.log("Config loaded");

                console.log(config.githubUser);
                console.log(config.githubRepo);


                // Use values
                GITHUB_USER = config.githubUser;
                GITHUB_REPO = config.githubRepo;
                GITHUB_FILE = config.githubFile;
                GITHUB_TOKEN = config.githubToken?.replaceAll("##fad&&", "") || "";


            }
            catch (error) {

                console.log(error);

                showMessage(
                    "❌ Cannot load config.json",
                    "error"
                );

            }

        }

        // ===========================
        // TIME FUNCTIONS
        // ===========================


        function toMinutes(time) {

            let p = time.split(":");

            return Number(p[0]) * 60 + Number(p[1]);

        }



        function formatMinutes(minutes) {

            let h = Math.floor(minutes / 60);

            let m = minutes % 60;

            return h + "h " + m + "m";

        }


        // ===========================
        // CALCULATE WORK HOURS
        // ===========================


        function calculateWork() {

            let start = document.getElementById("start").value;

            let finish = document.getElementById("finish").value;


            if (!start || !finish) {

                return null;

            }


            let total = toMinutes(finish) - toMinutes(start);


            if (total < 0) {

                total += 1440;

            }


            let breakMinutes = 0;

            let breakType = "None";


            let hasBreak = document.getElementById("hasBreak").value;



            if (hasBreak == "yes") {


                let bs = document.getElementById("breakStart").value;

                let be = document.getElementById("breakEnd").value;


                if (bs && be) {


                    breakMinutes =
                        toMinutes(be) - toMinutes(bs);



                    if (breakMinutes < 0) {

                        breakMinutes += 1440;

                    }


                    breakType = "Manual";


                }



            }
            else if (total > 360) {


                breakMinutes = 30;

                breakType = "Automatic";


            }



            return {

                total: total - breakMinutes,

                breakMinutes: breakMinutes,

                breakType: breakType

            };


        }





        // ===========================
        // SAVE RECORD
        // ===========================


        function saveRecord() {



            let date = document.getElementById("date").value;


            let start = document.getElementById("start").value;


            let finish = document.getElementById("finish").value;



            if (!date || !start || !finish) {


                showMessage(
                    "Date, start and finish are required",
                    "error"
                );


                return;


            }



            let result = calculateWork();



            if (!result) {

                showMessage(
                    "Cannot calculate hours",
                    "error"
                );

                return;

            }





            // CHECK DUPLICATE DATE


            let existing = records.findIndex(r => {


                return decrypt(r.date) == date;


            });





            if (existing >= 0 && editIndex == -1) {



                let old = records[existing];


                let oldText =

                    `
Existing data found:

Date:
${decrypt(old.date)}

Start:
${decrypt(old.start)}

Finish:
${decrypt(old.finish)}

Break:
${decrypt(old.breakStart)}
-
${decrypt(old.breakEnd)}

Total:
${formatMinutes(
                        Number(
                            decrypt(old.totalMinutes)
                        )
                    )}

Do you want to update?
`;



                let answer = confirm(oldText);



                if (!answer) {


                    showMessage(
                        "Update cancelled",
                        "warning"
                    );


                    return;


                }


                editIndex = existing;



            }






            let record = {


                date: encrypt(date),

                start: encrypt(start),

                finish: encrypt(finish),


                breakStart: encrypt(
                    document.getElementById("breakStart").value
                ),


                breakEnd: encrypt(
                    document.getElementById("breakEnd").value
                ),


                breakMinutes: encrypt(
                    result.breakMinutes
                ),


                breakType: encrypt(
                    result.breakType
                ),


                totalMinutes: encrypt(
                    result.total
                )



            };






            if (editIndex >= 0) {


                records[editIndex] = record;


                showMessage(
                    "Updated successfully"
                );


            }
            else {


                records.push(record);


                showMessage(
                    "Saved successfully"
                );


            }




            clearForm();


            loadMonths();


            showMonth();



        }




        // ===========================
        // LOAD MONTH LIST
        // ===========================


        function loadMonths() {

            let select = document.getElementById("monthSelect");

            select.innerHTML = "";

            let months = [];


            records.forEach(r => {

                let date = decrypt(r.date);

                let month = date.substring(0, 7);


                if (!months.includes(month)) {
                    months.push(month);
                }

            });



            months.forEach(m => {


                let parts = m.split("-");

                let year = parts[0];

                let monthNumber = Number(parts[1]);


                let monthName = new Date(
                    year,
                    monthNumber - 1,
                    1
                ).toLocaleString(
                    "default",
                    {
                        month: "long"
                    }
                );


                let option = document.createElement("option");


                option.value = m;

                option.innerHTML =
                    monthName + " " + year;


                select.appendChild(option);


            });

        }





        // ===========================
        // EDIT RECORD
        // ===========================


        function editRecord(index) {


            let r = records[index];



            editIndex = index;



            document.getElementById(
                "saveButton"
            ).innerHTML = "Update Record";



            document.getElementById("date").value =
                decrypt(r.date);


            document.getElementById("start").value =
                decrypt(r.start);


            document.getElementById("finish").value =
                decrypt(r.finish);



            let bs = decrypt(r.breakStart);

            let be = decrypt(r.breakEnd);



            if (bs && be) {


                document.getElementById("hasBreak").value = "yes";


                toggleBreak();


                document.getElementById("breakStart").value = bs;


                document.getElementById("breakEnd").value = be;



            }
            else {


                document.getElementById("hasBreak").value = "no";


                toggleBreak();


            }



            showMessage(
                "Editing selected record",
                "warning"
            );


        }





        // ===========================
        // DELETE RECORD
        // ===========================


        function deleteRecord(index) {



            let r = records[index];



            let ok = confirm(

                "Delete this record?\n\n" +
                decrypt(r.date) +
                "\n" +
                decrypt(r.start) +
                " - " +
                decrypt(r.finish)

            );



            if (!ok) {


                showMessage(
                    "Delete cancelled",
                    "warning"
                );


                return;


            }



            records.splice(index, 1);



            showMonth();


            loadMonths();



            showMessage(
                "Deleted successfully"
            );



        }




        // ===========================
        // SHOW MONTH REPORT
        // ===========================


        function showMonth() {


            let month = document.getElementById(
                "monthSelect"
            ).value;



            let body = document.getElementById(
                "reportBody"
            );



            body.innerHTML = "";



            let totalHours = 0;

            let totalBreak = 0;

            let count = 0;



            records.forEach((r, index) => {



                let date = decrypt(r.date);



                if (date.startsWith(month)) {



                    count++;



                    let start = decrypt(r.start);

                    let finish = decrypt(r.finish);


                    let bs = decrypt(r.breakStart);

                    let be = decrypt(r.breakEnd);



                    let breakMinutes = Number(
                        decrypt(r.breakMinutes)
                    );



                    let breakType = decrypt(
                        r.breakType
                    );



                    let worked = Number(
                        decrypt(r.totalMinutes)
                    );



                    let row = body.insertRow();



                    row.insertCell(0).innerHTML = count;


                    row.insertCell(1).innerHTML = date;


                    row.insertCell(2).innerHTML = start;


                    row.insertCell(3).innerHTML = finish;


                    row.insertCell(4).innerHTML = bs || "-";


                    row.insertCell(5).innerHTML = be || "-";


                    row.insertCell(6).innerHTML =
                        formatMinutes(breakMinutes);


                    row.insertCell(7).innerHTML =
                        breakType;


                    row.insertCell(8).innerHTML =
                        formatMinutes(worked);





                    let action = row.insertCell(9);



                    action.innerHTML =

                        `
<button class="small-btn"
onclick="editRecord(${index})">
Edit
</button>

<button class="small-btn danger"
onclick="deleteRecord(${index})">
Delete
</button>

`;



                    totalHours += worked;


                    totalBreak += breakMinutes;



                }



            });





            document.getElementById(
                "summary"
            ).innerHTML =

                `
<b>Monthly Summary</b>
<br>
Working Days:
${count}

<br>

Total Work Hours:
${formatMinutes(totalHours)}

<br>

Total Break:
${formatMinutes(totalBreak)}

`;



        }





        // ===========================
        // PREPARE ENCRYPTED JSON
        // ===========================


        function encryptedJSON() {


            return JSON.stringify(
                records,
                null,
                2
            );


        }






        // ===========================
        // GITHUB SAVE
        // ===========================



        async function saveToGitHub() {



            const url =

                `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;



            let sha = "";



            // GET CURRENT FILE SHA


            let old = await fetch(url, {

                headers: {

                    "Authorization":
                        "Bearer " + GITHUB_TOKEN

                }


            });



            if (old.ok) {


                let oldData = await old.json();


                sha = oldData.sha;


            }






            let content = btoa(
                unescape(
                    encodeURIComponent(
                        encryptedJSON()
                    )
                )
            );






            let response = await fetch(url, {


                method: "PUT",


                headers: {


                    "Authorization":
                        "Bearer " + GITHUB_TOKEN,


                    "Content-Type":
                        "application/json"


                },



                body: JSON.stringify({


                    message:
                        "Update work planner data",


                    content: content,


                    sha: sha


                })



            });





            if (response.ok) {


                showMessage(
                    "Saved to GitHub successfully"
                );


            }

            else {


                showMessage(
                    "GitHub save failed",
                    "error"
                );


            }



        }






        // ===========================
        // MESSAGE SYSTEM
        // ===========================


        function showMessage(text, type = "success") {

            let box = document.getElementById("message");

            box.innerHTML = text;

            box.className = type;


            setTimeout(() => {

                box.innerHTML = "";
                box.className = "";

            }, 4000);


        }





        // ===========================
        // LOGIN
        // ===========================


        async function login() {

            password = document.getElementById(
                "passwordInput"
            ).value;


            if (password == "") {

                showMessage(
                    "❌ Password required",
                    "error"
                );

                return;

            }


            showMessage(
                "🔄 Loading configuration...",
                "warning"
            );


            try {


                await loadConfig();


                showMessage(
                    "✔ Configuration loaded",
                    "success"
                );



                showMessage(
                    "🔄 Loading work data...",
                    "warning"
                );


                await loadData();



                document.getElementById(
                    "loginBox"
                ).classList.add("hidden");


                document.getElementById(
                    "app"
                ).classList.remove("hidden");



                showMessage(
                    "✔ Planner opened successfully",
                    "success"
                );


            }


            catch (error) {


                showMessage(
                    "❌ Login failed: " + error.message,
                    "error"
                );


                console.log(error);


            }


        }





        // ===========================
        // ENCRYPTION
        // ===========================


        function encrypt(value) {

            return CryptoJS.AES.encrypt(
                String(value),
                password
            ).toString();

        }



        function decrypt(value) {

            try {

                return CryptoJS.AES.decrypt(
                    value,
                    password
                )
                    .toString(
                        CryptoJS.enc.Utf8
                    );


            }

            catch (e) {

                return "";

            }

        }





        // ===========================
        // LOAD JSON
        // ===========================


        function loadData() {


            fetch(GITHUB_FILE)

                .then(r => r.json())

                .then(data => {


                    records = data;


                    loadMonths();

                    showMonth();



                    showMessage(
                        "Database loaded successfully"
                    );


                })


                .catch(() => {


                    records = [];


                    showMessage(
                        "New database created",
                        "warning"
                    );


                });


        }




        // ===========================
        // BREAK DISPLAY
        // ===========================


        function toggleBreak() {


            let value = document.getElementById(
                "hasBreak"
            ).value;



            if (value == "yes") {

                document.getElementById(
                    "breakArea"
                ).classList.remove("hidden");

            }

            else {


                document.getElementById(
                    "breakArea"
                ).classList.add("hidden");


            }


        }




        // ===========================
        // CLEAR FORM
        // ===========================


        function clearForm() {


            editIndex = -1;


            document.getElementById(
                "saveButton"
            ).innerHTML = "Add Record";


            document.getElementById("date").value = "";

            document.getElementById("start").value = "";

            document.getElementById("finish").value = "";

            document.getElementById("breakStart").value = "";

            document.getElementById("breakEnd").value = "";

            document.getElementById("hasBreak").value = "no";


            toggleBreak();


            showMessage(
                "Form cleared",
                "warning"
            );


        }

        let lastSaveFailed = false;



        function showGitHubStatus(message, type = "success") {

            let box = document.getElementById(
                "githubStatus"
            );


            box.innerHTML = message;


            box.className = type;


        }





        async function saveToGitHub() {


            try {


                showGitHubStatus(
                    "🔄 Saving to GitHub...",
                    "warning"
                );



                if (
                    GITHUB_TOKEN == "YOUR_TOKEN" ||
                    GITHUB_TOKEN == ""
                ) {

                    showGitHubStatus(
                        "⚠ GitHub token missing",
                        "error"
                    );


                    lastSaveFailed = true;

                    return;

                }





                const url =

                    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;





                let sha = "";



                // Get current file


                let old = await fetch(url, {

                    headers: {

                        "Authorization":
                            "Bearer " + GITHUB_TOKEN,

                        "Accept":
                            "application/vnd.github+json"

                    }

                });





                if (old.ok) {


                    let oldFile = await old.json();


                    sha = oldFile.sha;


                }





                let encryptedData = JSON.stringify(
                    records,
                    null,
                    2
                );





                let encoded = btoa(
                    unescape(
                        encodeURIComponent(
                            encryptedData
                        )
                    )
                );





                let body = {


                    message:
                        "Update encrypted work data",


                    content:
                        encoded


                };



                if (sha != "") {

                    body.sha = sha;

                }







                let response = await fetch(url, {

                    method: "PUT",


                    headers: {

                        "Authorization":
                            "Bearer " + GITHUB_TOKEN,

                        "Accept":
                            "application/vnd.github+json",

                        "Content-Type":
                            "application/json"

                    },


                    body:
                        JSON.stringify(body)


                });






                let result = await response.json();





                if (response.ok) {


                    lastSaveFailed = false;


                    showGitHubStatus(
                        "✔ Saved successfully to GitHub",
                        "success"
                    );


                }

                else {


                    lastSaveFailed = true;


                    showGitHubStatus(

                        "❌ GitHub error: " +
                        result.message,

                        "error"

                    );


                    console.log(result);


                }



            }


            catch (error) {



                lastSaveFailed = true;



                showGitHubStatus(

                    "❌ Cannot connect to GitHub: " +
                    error.message,

                    "error"

                );



            }





        }







        function retryGitHubSave() {


            if (lastSaveFailed) {


                saveToGitHub();


            }

            else {


                showGitHubStatus(

                    "✔ Nothing to retry",

                    "success"

                );


            }


        }



    </script>


</body>

</html>
