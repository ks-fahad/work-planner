<!DOCTYPE html>
<html>
<head>
<title>Work Planner</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    padding:30px;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:1200px;
    margin:auto;
}

input,button,select{
    padding:8px;
    margin:5px;
}

button{
    background:#0066cc;
    color:white;
    border:0;
    border-radius:5px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#0066cc;
    color:white;
}

.summary{
    margin-top:20px;
    font-size:18px;
}
</style>

</head>

<body>

<div class="container">

<h2>Work Planner</h2>


Date:
<input type="date" id="date">

Start:
<input type="time" id="start">

Finish:
<input type="time" id="finish">


<br>

Break start:
<input type="time" id="breakStart">

Break end:
<input type="time" id="breakEnd">


<br>

<button onclick="addWork()">Add Day</button>

<button onclick="downloadJSON()">Export JSON</button>


<h3>Monthly Report</h3>

<select id="month" onchange="showMonth()">
</select>


<table>

<thead>
<tr>
<th>Date</th>
<th>Start</th>
<th>Finish</th>
<th>Break Start</th>
<th>Break End</th>
<th>Break Time</th>
<th>Break Type</th>
<th>Total Hours</th>
</tr>
</thead>

<tbody id="report"></tbody>

</table>


<div class="summary" id="summary"></div>


</div>


<script>


let records=[];



fetch("workdata.json")
.then(r=>r.json())
.then(data=>{
    records=data;
    loadMonths();
    showMonth();
});



function timeMinutes(t){

    let x=t.split(":");

    return Number(x[0])*60+Number(x[1]);

}



function formatHours(min){

    let h=Math.floor(min/60);
    let m=min%60;

    return h+"h "+m+"m";

}



function addWork(){


let date=document.getElementById("date").value;
let start=document.getElementById("start").value;
let finish=document.getElementById("finish").value;

let bs=document.getElementById("breakStart").value;
let be=document.getElementById("breakEnd").value;


if(!date || !start || !finish){
alert("Fill date, start and finish");
return;
}


let total=timeMinutes(finish)-timeMinutes(start);

if(total<0){
total+=1440;
}


let breakMinutes=0;
let breakType="none";


if(bs && be){

breakMinutes=timeMinutes(be)-timeMinutes(bs);

if(breakMinutes<0){
breakMinutes+=1440;
}

breakType="manual";

}
else if(total>360){

breakMinutes=30;
breakType="automatic";

}


let worked=total-breakMinutes;



records.push({

date:date,
start:start,
finish:finish,

breakStart:bs || "",
breakEnd:be || "",

breakMinutes:breakMinutes,

breakType:breakType,

totalMinutes:worked

});


loadMonths();
showMonth();


}



function loadMonths(){

let select=document.getElementById("month");

select.innerHTML="";


let months=[...new Set(records.map(x=>x.date.substring(0,7)))];


months.forEach(m=>{

let option=document.createElement("option");

option.value=m;
option.text=m;

select.appendChild(option);

});


}



function showMonth(){


let month=document.getElementById("month").value;


let table=document.getElementById("report");

table.innerHTML="";


let total=0;
let breaks=0;


records
.filter(x=>x.date.startsWith(month))
.forEach(x=>{


let row=table.insertRow();


row.insertCell(0).innerHTML=x.date;
row.insertCell(1).innerHTML=x.start;
row.insertCell(2).innerHTML=x.finish;

row.insertCell(3).innerHTML=x.breakStart || "-";
row.insertCell(4).innerHTML=x.breakEnd || "-";

row.insertCell(5).innerHTML=formatHours(x.breakMinutes);

row.insertCell(6).innerHTML=x.breakType;

row.insertCell(7).innerHTML=formatHours(x.totalMinutes);


total+=x.totalMinutes;
breaks+=x.breakMinutes;


});


document.getElementById("summary").innerHTML=

"Total worked: "+formatHours(total)+
"<br>Total break: "+formatHours(breaks)+
"<br>Days worked: "+
records.filter(x=>x.date.startsWith(month)).length;



}



function downloadJSON(){

let file=new Blob(
[
JSON.stringify(records,null,2)
],
{
type:"application/json"
}
);


let a=document.createElement("a");

a.href=URL.createObjectURL(file);

a.download="workdata.json";

a.click();


}



</script>

</body>
</html>
