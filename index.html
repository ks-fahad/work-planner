<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encrypted Work Planner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>


<style>

body{
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    padding:20px;
}


.container{

    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;

}


h1,h2{

    text-align:center;

}


.input-group{

    margin-bottom:15px;

}


label{

    display:block;
    font-weight:bold;
    margin-bottom:5px;

}


input,select,button{

    width:100%;
    padding:10px;
    box-sizing:border-box;

}


button{

    margin-top:10px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;

}


button:hover{

    background:#004999;

}


.hidden{

    display:none;

}


table{

    width:100%;
    border-collapse:collapse;
    margin-top:20px;

}


th,td{

    border:1px solid #ccc;
    padding:8px;
    text-align:center;

}


th{

    background:#0066cc;
    color:white;

}


.card{

    background:#eee;
    padding:15px;
    border-radius:5px;
    margin-top:20px;

}


</style>


</head>



<body>


<div class="container">


<h1>Encrypted Work Planner</h1>



<!-- PASSWORD SECTION -->


<div id="loginBox" class="card">


<h2>Password</h2>


<div class="input-group">

<label>
Encryption Password
</label>

<input 
type="password"
id="passwordInput"
placeholder="Enter password">

</div>


<button onclick="login()">
Open Planner
</button>


</div>





<!-- MAIN APP -->


<div id="app" class="hidden">



<h2>Add Work</h2>



<div class="input-group">

<label>
Date
</label>

<input 
type="date"
id="date">

</div>





<div class="input-group">

<label>
Start Time
</label>

<input 
type="time"
id="start">

</div>





<div class="input-group">

<label>
End Time
</label>

<input 
type="time"
id="finish">

</div>





<div class="input-group">

<label>
Do you have a break?
</label>


<select id="hasBreak" onchange="showBreakInputs()">

<option value="no">
No
</option>

<option value="yes">
Yes
</option>


</select>

</div>





<div id="breakBox" class="hidden">


<div class="input-group">

<label>
Break Start
</label>

<input 
type="time"
id="breakStart">

</div>




<div class="input-group">

<label>
Break End
</label>

<input 
type="time"
id="breakEnd">

</div>



</div>





<button onclick="saveRecord()">

Add / Update

</button>



<button onclick="clearForm()">

Clear

</button>





<h2>Monthly Report</h2>



<div class="input-group">

<label>
Select Month
</label>


<select id="monthSelect"
onchange="showMonth()">

</select>


</div>




<table>


<thead>

<tr>

<th>Date</th>
<th>Start</th>
<th>Finish</th>
<th>Break Start</th>
<th>Break End</th>
<th>Break</th>
<th>Type</th>
<th>Total</th>
<th>Action</th>


</tr>

</thead>


<tbody id="reportBody">

</tbody>


</table>




<div class="card" id="summary">

</div>



</div>



</div>





<script>


let password="";

let records=[];

let editIndex=-1;



/*
LOGIN
*/


function login(){


password=document.getElementById(
"passwordInput"
).value;


if(password==""){

alert("Enter password");

return;

}


document.getElementById(
"loginBox"
).style.display="none";


document.getElementById(
"app"
).classList.remove("hidden");



loadData();


}





/*
ENCRYPTION
*/


function encrypt(value){


return CryptoJS.AES.encrypt(

String(value),

password

).toString();


}



function decrypt(value){


try{


return CryptoJS.AES.decrypt(

value,

password

).toString(
CryptoJS.enc.Utf8
);


}

catch(e){

return "";

}


}





/*
LOAD JSON
*/


function loadData(){


fetch("workdata.json")

.then(response=>response.json())

.then(data=>{


records=data;


loadMonths();


showMonth();


})

.catch(()=>{


records=[];


});


}






function showBreakInputs(){


let value=document.getElementById(
"hasBreak"
).value;



if(value=="yes"){


document.getElementById(
"breakBox"
).classList.remove("hidden");


}

else{


document.getElementById(
"breakBox"
).classList.add("hidden");


}


}





function clearForm(){


editIndex=-1;


document.getElementById("date").value="";

document.getElementById("start").value="";

document.getElementById("finish").value="";

document.getElementById("breakStart").value="";

document.getElementById("breakEnd").value="";


}





</script>


</body>

</html>
