<!DOCTYPE html>
<html>
<head>

<title>Encrypted Work Planner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input,button,select{
    padding:8px;
    margin:5px;
}

button{
    background:#0066cc;
    color:white;
    border:0;
    border-radius:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

td,th{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#0066cc;
    color:white;
}

</style>

</head>


<body>


<div class="container">


<h2>Encrypted Work Planner</h2>


<button onclick="addWork()">Add Work Day</button>

<button onclick="downloadEncrypted()">Export Encrypted Data</button>


<br>


Date:
<input type="date" id="date">


Start:
<input type="time" id="start">


Finish:
<input type="time" id="finish">


<br>


Break Start:
<input type="time" id="breakStart">


Break End:
<input type="time" id="breakEnd">


<br><br>


Month:

<select id="month" onchange="showMonth()"></select>


<table>


<thead>

<tr>

<th>Date</th>
<th>Start</th>
<th>Finish</th>
<th>Break Start</th>
<th>Break End</th>
<th>Break Time</th>
<th>Type</th>
<th>Hours</th>

</tr>

</thead>


<tbody id="report"></tbody>


</table>


<h3 id="summary"></h3>


</div>



<script>


let password="";

let records=[];



password=prompt("Enter encryption password:");



function encrypt(value){

return CryptoJS.AES.encrypt(
String(value),
password
).toString();

}



function decrypt(value){

return CryptoJS.AES.decrypt(
value,
password
).toString(
CryptoJS.enc.Utf8
);

}




fetch("workdata.json")

.then(r=>r.json())

.then(data=>{


records=data;


loadMonths();

showMonth();


});






function minutes(t){

let p=t.split(":");

return Number(p[0])*60+Number(p[1]);

}





function formatTime(m){

let h=Math.floor(m/60);

let min=m%60;


return h+"h "+min+"m";

}





function addWork(){



let date=document.getElementById("date").value;

let start=document.getElementById("start").value;

let finish=document.getElementById("finish").value;


let breakStart=document.getElementById("breakStart").value;

let breakEnd=document.getElementById("breakEnd").value;



if(!date || !start || !finish){

alert("Fill date, start and finish");

return;

}



let total=minutes(finish)-minutes(start);


if(total<0){

total+=1440;

}



let breakMinutes=0;

let type="none";



if(breakStart && breakEnd){


breakMinutes=minutes(breakEnd)-minutes(breakStart);


if(breakMinutes<0){

breakMinutes+=1440;

}


type="manual";


}

else if(total>360){


breakMinutes=30;

type="automatic";


}



let worked=total-breakMinutes;




records.push({


date:encrypt(date),

start:encrypt(start),

finish:encrypt(finish),


breakStart:encrypt(breakStart || ""),

breakEnd:encrypt(breakEnd || ""),


breakMinutes:encrypt(breakMinutes),

breakType:encrypt(type),

totalMinutes:encrypt(worked)



});



loadMonths();

showMonth();


}







function loadMonths(){


let select=document.getElementById("month");


select.innerHTML="";



let months=[];


records.forEach(r=>{

let d=decrypt(r.date);

let m=d.substring(0,7);


if(!months.includes(m))
months.push(m);


});



months.forEach(m=>{


let option=document.createElement("option");

option.value=m;

option.text=m;


select.appendChild(option);


});


}






function showMonth(){


let month=document.getElementById("month").value;


let body=document.getElementById("report");


body.innerHTML="";


let total=0;

let breaks=0;

let days=0;



records.forEach(r=>{


let date=decrypt(r.date);



if(date.startsWith(month)){


let start=decrypt(r.start);

let finish=decrypt(r.finish);

let bs=decrypt(r.breakStart);

let be=decrypt(r.breakEnd);


let bm=Number(
decrypt(r.breakMinutes)
);


let type=decrypt(r.breakType);


let hours=Number(
decrypt(r.totalMinutes)
);



let row=body.insertRow();


row.insertCell(0).innerHTML=date;

row.insertCell(1).innerHTML=start;

row.insertCell(2).innerHTML=finish;

row.insertCell(3).innerHTML=bs || "-";

row.insertCell(4).innerHTML=be || "-";

row.insertCell(5).innerHTML=formatTime(bm);

row.insertCell(6).innerHTML=type;

row.insertCell(7).innerHTML=formatTime(hours);



total+=hours;

breaks+=bm;

days++;



}



});



document.getElementById("summary").innerHTML=

"Days: "+days+
" | Worked: "+formatTime(total)+
" | Break: "+formatTime(breaks);



}







function downloadEncrypted(){


let file=new Blob(

[
JSON.stringify(records,null,2)
],

{
type:"application/json"
}

);



let a=document.createElement("a");


a.href=URL.createObjectURL(file);


a.download="workdata.json";


a.click();



}



</script>


</body>
</html>
